<svg width="960" height="560" viewBox="0 0 960 560" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <rect width="960" height="560" rx="16" fill="#F6F6F4"/>

  <!-- pass body -->
  <rect x="340" y="60" width="280" height="440" rx="18" fill="#ffffff" stroke="#1a2f3f" stroke-width="1.5"/>

  <!-- logo zone -->
  <rect x="354" y="78" width="80" height="26" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="394" y="95" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2f3f">AIRLINE</text>

  <!-- header field zone -->
  <rect x="540" y="78" width="66" height="26" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="573" y="89" text-anchor="middle" font-size="7" fill="#5a6b75">FLIGHT</text>
  <text x="573" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2f3f">AP 1042</text>

  <!-- primary fields: origin / destination -->
  <rect x="354" y="124" width="92" height="52" rx="8" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="362" y="140" font-size="7" fill="#5a6b75">SAN FRANCISCO</text>
  <text x="362" y="166" font-size="20" font-weight="700" fill="#1a2f3f">SFO</text>
  <rect x="514" y="124" width="92" height="52" rx="8" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="522" y="140" font-size="7" fill="#5a6b75">TOKYO</text>
  <text x="522" y="166" font-size="20" font-weight="700" fill="#1a2f3f">NRT</text>
  <!-- plane between -->
  <path d="M 466 152 h 26 m 0 0 l -7 -6 m 7 6 l -7 6" stroke="#1a2f3f" stroke-width="1.6" fill="none"/>

  <!-- auxiliary fields (above secondary on boarding passes) -->
  <rect x="354" y="194" width="84" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="362" y="206" font-size="7" fill="#5a6b75">DATE</text>
  <text x="362" y="218" font-size="10" font-weight="600" fill="#1a2f3f">Jun 8, 2026</text>
  <rect x="446" y="194" width="76" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="454" y="206" font-size="7" fill="#5a6b75">DEPART</text>
  <text x="454" y="218" font-size="10" font-weight="600" fill="#1a2f3f">8:00 AM</text>
  <rect x="530" y="194" width="76" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="538" y="206" font-size="7" fill="#5a6b75">CLASS</text>
  <text x="538" y="218" font-size="10" font-weight="600" fill="#1a2f3f">Economy</text>

  <!-- secondary fields -->
  <rect x="354" y="236" width="56" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="362" y="248" font-size="7" fill="#5a6b75">TERM</text>
  <text x="362" y="260" font-size="10" font-weight="600" fill="#1a2f3f">I</text>
  <rect x="418" y="236" width="56" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="426" y="248" font-size="7" fill="#5a6b75">GATE</text>
  <text x="426" y="260" font-size="10" font-weight="600" fill="#1a2f3f">G9</text>
  <rect x="482" y="236" width="56" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="490" y="248" font-size="7" fill="#5a6b75">GROUP</text>
  <text x="490" y="260" font-size="10" font-weight="600" fill="#1a2f3f">1</text>
  <rect x="546" y="236" width="60" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="554" y="248" font-size="7" fill="#5a6b75">SEAT</text>
  <text x="554" y="260" font-size="10" font-weight="600" fill="#1a2f3f">17C</text>

  <!-- QR barcode -->
  <rect x="428" y="370" width="104" height="104" rx="10" fill="#ffffff" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <g fill="#1a2f3f">
    <rect x="440" y="382" width="20" height="20" rx="2"/><rect x="444" y="386" width="12" height="12" fill="#ffffff" rx="1"/><rect x="447" y="389" width="6" height="6"/>
    <rect x="500" y="382" width="20" height="20" rx="2"/><rect x="504" y="386" width="12" height="12" fill="#ffffff" rx="1"/><rect x="507" y="389" width="6" height="6"/>
    <rect x="440" y="442" width="20" height="20" rx="2"/><rect x="444" y="446" width="12" height="12" fill="#ffffff" rx="1"/><rect x="447" y="449" width="6" height="6"/>
    <rect x="468" y="386" width="5" height="5"/><rect x="478" y="382" width="5" height="5"/><rect x="488" y="390" width="5" height="5"/><rect x="472" y="396" width="5" height="5"/><rect x="484" y="398" width="5" height="5"/>
    <rect x="444" y="410" width="5" height="5"/><rect x="454" y="414" width="5" height="5"/><rect x="466" y="410" width="5" height="5"/><rect x="478" y="416" width="5" height="5"/><rect x="490" y="410" width="5" height="5"/><rect x="502" y="414" width="5" height="5"/><rect x="512" y="410" width="5" height="5"/>
    <rect x="448" y="426" width="5" height="5"/><rect x="460" y="430" width="5" height="5"/><rect x="472" y="426" width="5" height="5"/><rect x="484" y="432" width="5" height="5"/><rect x="496" y="426" width="5" height="5"/><rect x="508" y="430" width="5" height="5"/>
    <rect x="468" y="446" width="5" height="5"/><rect x="480" y="450" width="5" height="5"/><rect x="492" y="446" width="5" height="5"/><rect x="504" y="452" width="5" height="5"/><rect x="472" y="460" width="5" height="5"/><rect x="486" y="462" width="5" height="5"/>
  </g>

  <!-- LEFT callouts -->
  <g stroke="#1a2f3f" stroke-width="1">
    <line x1="300" y1="150" x2="352" y2="150"/>
    <line x1="300" y1="251" x2="352" y2="251"/>
  </g>
  <g fill="#1a2f3f"><circle cx="352" cy="150" r="2.5"/><circle cx="352" cy="251" r="2.5"/></g>
  <text x="292" y="145" text-anchor="end" font-size="14" font-weight="600" fill="#1a2f3f">Primary fields</text>
  <text x="292" y="160" text-anchor="end" font-size="11.5" fill="#5a6b75">origin and destination,</text>
  <text x="292" y="173" text-anchor="end" font-size="11.5" fill="#5a6b75">rendered large</text>

  <text x="292" y="246" text-anchor="end" font-size="14" font-weight="600" fill="#1a2f3f">Secondary fields</text>
  <text x="292" y="261" text-anchor="end" font-size="11.5" fill="#5a6b75">terminal, gate, group, seat —</text>
  <text x="292" y="274" text-anchor="end" font-size="11.5" fill="#5a6b75">up to 5 per row on this style</text>

  <!-- RIGHT callouts -->
  <g stroke="#1a2f3f" stroke-width="1">
    <line x1="608" y1="91" x2="660" y2="91"/>
    <line x1="608" y1="209" x2="660" y2="209"/>
  </g>
  <g fill="#1a2f3f"><circle cx="608" cy="91" r="2.5"/><circle cx="608" cy="209" r="2.5"/></g>
  <text x="668" y="86" font-size="14" font-weight="600" fill="#1a2f3f">Header fields</text>
  <text x="668" y="101" font-size="11.5" fill="#5a6b75">flight number and date</text>

  <text x="668" y="204" font-size="14" font-weight="600" fill="#1a2f3f">Auxiliary fields</text>
  <text x="668" y="219" font-size="11.5" fill="#5a6b75">unlike every other style, these</text>
  <text x="668" y="232" font-size="11.5" fill="#5a6b75">sit above the secondary fields</text>

  <text x="480" y="536" text-anchor="middle" font-size="11" fill="#5a6b75">Boarding Pass — travel layout with origin and destination as the hero, and up to 5 fields per row.</text>
</svg>
