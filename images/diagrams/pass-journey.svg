<svg width="960" height="236" viewBox="0 0 960 236" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <rect width="960" height="236" rx="16" fill="#F6F6F4"/>
  <defs>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#9aa7ae"/>
    </marker>
  </defs>

  <!-- ===== Step 1: enrollment QR code ===== -->
  <g>
    <rect x="86" y="66" width="52" height="52" rx="9" stroke="#1a2f3f" stroke-width="2.4"/>
    <rect x="95" y="75" width="11" height="11" rx="2" stroke="#1a2f3f" stroke-width="2"/>
    <rect x="118" y="75" width="11" height="11" rx="2" stroke="#1a2f3f" stroke-width="2"/>
    <rect x="95" y="98" width="11" height="11" rx="2" stroke="#1a2f3f" stroke-width="2"/>
    <rect x="98.2" y="78.2" width="4.5" height="4.5" fill="#1a2f3f"/>
    <rect x="121.2" y="78.2" width="4.5" height="4.5" fill="#1a2f3f"/>
    <rect x="98.2" y="101.2" width="4.5" height="4.5" fill="#1a2f3f"/>
    <rect x="118" y="98" width="4.5" height="4.5" fill="#1a2f3f"/>
    <rect x="124.5" y="104.5" width="4.5" height="4.5" fill="#1a2f3f"/>
    <rect x="124.5" y="98" width="4.5" height="4.5" fill="#88b9c3"/>
    <rect x="118" y="104.5" width="4.5" height="4.5" fill="#88b9c3"/>
  </g>
  <text x="112" y="170" text-anchor="middle" font-size="11" fill="#5a6b75">The customer enrolls</text>
  <text x="112" y="185" text-anchor="middle" font-size="11" fill="#5a6b75">through your link, QR code,</text>
  <text x="112" y="200" text-anchor="middle" font-size="11" fill="#5a6b75">or App Clip — or you issue</text>
  <text x="112" y="215" text-anchor="middle" font-size="11" fill="#5a6b75">the pass from the portal.</text>

  <line x1="156" y1="90" x2="252" y2="90" stroke="#9aa7ae" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ===== Step 2: pass into the wallet app on the phone ===== -->
  <g>
    <rect x="275" y="58" width="42" height="66" rx="9" fill="#F6F6F4" stroke="#1a2f3f" stroke-width="2.4"/>
    <rect x="282" y="92" width="28" height="7" rx="2.5" fill="#88b9c3" fill-opacity="0.3"/>
    <rect x="282" y="101" width="28" height="7" rx="2.5" fill="#88b9c3" fill-opacity="0.45"/>
    <rect x="282" y="110" width="28" height="8" rx="2.5" fill="#88b9c3" fill-opacity="0.6"/>
    <rect x="284" y="42" width="24" height="32" rx="4" fill="#b9d4d9" stroke="#1a2f3f" stroke-width="2"/>
    <rect x="289" y="48" width="8" height="4" rx="2" fill="#1a2f3f" fill-opacity="0.4"/>
    <path d="M 291.5 80.5 L 296 85 L 300.5 80.5" stroke="#1a2f3f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="296" y="170" text-anchor="middle" font-size="11" fill="#5a6b75">The pass is added to</text>
  <text x="296" y="185" text-anchor="middle" font-size="11" fill="#5a6b75">Apple Wallet or</text>
  <text x="296" y="200" text-anchor="middle" font-size="11" fill="#5a6b75">Google Wallet.</text>

  <line x1="344" y1="90" x2="444" y2="90" stroke="#9aa7ae" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ===== Step 3: live pass with notifications ===== -->
  <g>
    <rect x="458" y="56" width="42" height="68" rx="9" fill="#F6F6F4" stroke="#1a2f3f" stroke-width="2.4"/>
    <rect x="472" y="62" width="14" height="3" rx="1.5" fill="#1a2f3f" fill-opacity="0.45"/>
    <rect x="466" y="72" width="26" height="18" rx="3" fill="#88b9c3" fill-opacity="0.55"/>
    <rect x="466" y="96" width="26" height="4" rx="2" fill="#88b9c3" fill-opacity="0.3"/>
    <rect x="466" y="104" width="18" height="4" rx="2" fill="#88b9c3" fill-opacity="0.3"/>
    <circle cx="500" cy="58" r="10" fill="#88b9c3" stroke="#1a2f3f" stroke-width="2"/>
    <path d="M 494.8 61.3 c 0 -0.9 1.4 -1.7 1.4 -3.5 v -1.5 a 3.8 3.8 0 0 1 7.6 0 v 1.5 c 0 1.8 1.4 2.6 1.4 3.5 z" fill="#1a2f3f"/>
    <circle cx="500" cy="63.4" r="1.4" fill="#1a2f3f"/>
  </g>
  <text x="480" y="170" text-anchor="middle" font-size="11" fill="#5a6b75">The pass stays live —</text>
  <text x="480" y="185" text-anchor="middle" font-size="11" fill="#5a6b75">updates and notifications</text>
  <text x="480" y="200" text-anchor="middle" font-size="11" fill="#5a6b75">appear on it automatically.</text>

  <line x1="528" y1="90" x2="616" y2="90" stroke="#9aa7ae" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ===== Step 4: tap a Terminal ===== -->
  <g>
    <rect x="630" y="58" width="36" height="62" rx="8" fill="#F6F6F4" stroke="#1a2f3f" stroke-width="2.4"/>
    <rect x="636" y="68" width="24" height="16" rx="2.5" fill="#88b9c3" fill-opacity="0.4"/>
    <g stroke="#88b9c3" stroke-width="2.6" stroke-linecap="round">
      <path d="M 674 79 A 12 12 0 0 1 674 97"/>
      <path d="M 682 73 A 19 19 0 0 1 682 105"/>
      <path d="M 690 67 A 26 26 0 0 1 690 111"/>
    </g>
  </g>
  <text x="664" y="170" text-anchor="middle" font-size="11" fill="#5a6b75">At checkout, the customer</text>
  <text x="664" y="185" text-anchor="middle" font-size="11" fill="#5a6b75">taps a Terminal or</text>
  <text x="664" y="200" text-anchor="middle" font-size="11" fill="#5a6b75">shows the barcode.</text>

  <line x1="720" y1="90" x2="806" y2="90" stroke="#9aa7ae" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ===== Step 5: transaction recorded ===== -->
  <g>
    <rect x="820" y="56" width="56" height="66" rx="9" fill="#F6F6F4" stroke="#1a2f3f" stroke-width="2.4"/>
    <rect x="828" y="64" width="15" height="6" rx="2" fill="#88b9c3" fill-opacity="0.45"/>
    <rect x="856" y="64" width="11" height="6" rx="2" fill="#88b9c3" fill-opacity="0.45"/>
    <rect x="821.2" y="77" width="53.6" height="14" fill="#88b9c3" fill-opacity="0.4"/>
    <rect x="828" y="98" width="17" height="5" rx="2" fill="#88b9c3" fill-opacity="0.3"/>
    <rect x="855" y="98" width="13" height="5" rx="2" fill="#88b9c3" fill-opacity="0.3"/>
    <circle cx="872" cy="116" r="13" fill="#1a2f3f" stroke="#F6F6F4" stroke-width="3"/>
    <path d="M 865.5 116 l 4.6 4.6 l 9 -9.5" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="848" y="170" text-anchor="middle" font-size="11" fill="#5a6b75">The transaction is recorded</text>
  <text x="848" y="185" text-anchor="middle" font-size="11" fill="#5a6b75">and rewards are applied.</text>
</svg>
