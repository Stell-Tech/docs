<svg width="960" height="560" viewBox="0 0 960 560" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <rect width="960" height="560" rx="16" fill="#F6F6F4"/>

  <!-- pass body -->
  <rect x="340" y="60" width="280" height="440" rx="18" fill="#ffffff" stroke="#1a2f3f" stroke-width="1.5"/>

  <!-- logo zone -->
  <rect x="354" y="78" width="80" height="26" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="394" y="95" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2f3f">LOGO</text>

  <!-- header field zone -->
  <rect x="540" y="78" width="66" height="26" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="573" y="89" text-anchor="middle" font-size="7" fill="#5a6b75">ACCESS</text>
  <text x="573" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#1a2f3f">VIP</text>

  <!-- primary field with thumbnail to its right -->
  <rect x="354" y="126" width="158" height="48" rx="8" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="364" y="143" font-size="7" fill="#5a6b75">EVENT</text>
  <text x="364" y="163" font-size="14" font-weight="600" fill="#1a2f3f">Summer Live</text>

  <!-- thumbnail -->
  <rect x="530" y="122" width="76" height="76" rx="8" fill="#88b9c3" fill-opacity="0.45" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <circle cx="556" cy="148" r="9" fill="#ffffff" fill-opacity="0.8"/>
  <path d="M 536 190 L 556 164 L 572 182 L 580 172 L 600 194 H 536 Z" fill="#ffffff" fill-opacity="0.8"/>

  <!-- secondary field -->
  <rect x="354" y="186" width="158" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="362" y="198" font-size="7" fill="#5a6b75">LOCATION</text>
  <text x="362" y="210" font-size="10" font-weight="600" fill="#1a2f3f">Oslo Spektrum</text>

  <!-- auxiliary fields -->
  <rect x="354" y="232" width="100" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="362" y="244" font-size="7" fill="#5a6b75">TIME</text>
  <text x="362" y="256" font-size="10" font-weight="600" fill="#1a2f3f">21 Jun, 19:00</text>
  <rect x="462" y="232" width="44" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="470" y="244" font-size="7" fill="#5a6b75">LEVEL</text>
  <text x="470" y="256" font-size="10" font-weight="600" fill="#1a2f3f">3</text>
  <rect x="514" y="232" width="44" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="522" y="244" font-size="7" fill="#5a6b75">ROW</text>
  <text x="522" y="256" font-size="10" font-weight="600" fill="#1a2f3f">12</text>
  <rect x="566" y="232" width="40" height="30" rx="6" fill="#88b9c3" fill-opacity="0.30" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="574" y="244" font-size="7" fill="#5a6b75">SEAT</text>
  <text x="574" y="256" font-size="10" font-weight="600" fill="#1a2f3f">5</text>

  <!-- barcode -->
  <rect x="410" y="400" width="140" height="76" rx="8" fill="#ffffff" stroke="#1a2f3f" stroke-width="1" stroke-dasharray="4 3"/>
  <g fill="#1a2f3f">
    <rect x="424" y="412" width="3" height="40"/><rect x="430" y="412" width="2" height="40"/><rect x="436" y="412" width="4" height="40"/><rect x="444" y="412" width="2" height="40"/><rect x="450" y="412" width="3" height="40"/><rect x="457" y="412" width="2" height="40"/><rect x="462" y="412" width="5" height="40"/><rect x="471" y="412" width="2" height="40"/><rect x="477" y="412" width="3" height="40"/><rect x="484" y="412" width="2" height="40"/><rect x="490" y="412" width="4" height="40"/><rect x="498" y="412" width="2" height="40"/><rect x="504" y="412" width="3" height="40"/><rect x="511" y="412" width="2" height="40"/><rect x="517" y="412" width="4" height="40"/><rect x="525" y="412" width="2" height="40"/><rect x="531" y="412" width="3" height="40"/>
  </g>
  <text x="480" y="466" text-anchor="middle" font-size="8" fill="#5a6b75">1234 5678</text>

  <!-- LEFT callouts -->
  <g stroke="#1a2f3f" stroke-width="1">
    <line x1="300" y1="150" x2="352" y2="150"/>
    <line x1="300" y1="247" x2="352" y2="247"/>
  </g>
  <g fill="#1a2f3f"><circle cx="352" cy="150" r="2.5"/><circle cx="352" cy="247" r="2.5"/></g>
  <text x="292" y="145" text-anchor="end" font-size="14" font-weight="600" fill="#1a2f3f">Primary field</text>
  <text x="292" y="160" text-anchor="end" font-size="11.5" fill="#5a6b75">the event name — narrower, to</text>
  <text x="292" y="173" text-anchor="end" font-size="11.5" fill="#5a6b75">leave room for the thumbnail</text>

  <text x="292" y="242" text-anchor="end" font-size="14" font-weight="600" fill="#1a2f3f">Auxiliary fields</text>
  <text x="292" y="257" text-anchor="end" font-size="11.5" fill="#5a6b75">time, level, row, seat</text>

  <!-- RIGHT callouts -->
  <g stroke="#1a2f3f" stroke-width="1">
    <line x1="608" y1="91" x2="660" y2="91"/>
    <line x1="608" y1="160" x2="660" y2="160"/>
    <line x1="514" y1="201" x2="660" y2="201"/>
  </g>
  <g fill="#1a2f3f"><circle cx="608" cy="91" r="2.5"/><circle cx="608" cy="160" r="2.5"/><circle cx="514" cy="201" r="2.5"/></g>
  <text x="668" y="86" font-size="14" font-weight="600" fill="#1a2f3f">Header fields</text>
  <text x="668" y="101" font-size="11.5" fill="#5a6b75">access level or guest number</text>

  <text x="668" y="155" font-size="14" font-weight="600" fill="#1a2f3f">Thumbnail</text>
  <text x="668" y="170" font-size="11.5" fill="#5a6b75">a square 90 × 90 px image —</text>
  <text x="668" y="183" font-size="11.5" fill="#5a6b75">only the Event Ticket style has it</text>

  <text x="668" y="206" font-size="14" font-weight="600" fill="#1a2f3f">Secondary fields</text>
  <text x="668" y="221" font-size="11.5" fill="#5a6b75">the venue or location</text>

  <text x="480" y="530" text-anchor="middle" font-size="11" fill="#5a6b75">Event Ticket — standard layout. A strip image replaces the thumbnail row when used, and with poster artwork,</text>
  <text x="480" y="545" text-anchor="middle" font-size="11" fill="#5a6b75">iPhones on iOS 18+ use a full-bleed poster layout instead.</text>
</svg>
