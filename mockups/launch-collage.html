<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="assets/mintleaf.css">
<style>
  body {
    width: 1280px; height: 880px;
    background: linear-gradient(160deg, #f2ede2 0%, #e7dfcd 100%);
    position: relative; overflow: hidden; padding: 44px 56px;
  }
  .bg-leaf { position: absolute; opacity: 0.08; }

  .top { display: flex; align-items: baseline; gap: 18px; position: relative; }
  .top h1 { font-size: 26px; letter-spacing: -0.4px; color: var(--forest-dark); }
  .top span { font-size: 14.5px; color: var(--ink-soft); }

  .grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
    margin-top: 34px; position: relative;
  }
  .tile { position: relative; }
  .tile .frame {
    border-radius: 14px; overflow: hidden; background: #fff;
    box-shadow: 0 22px 50px rgba(70, 60, 35, 0.22);
    height: 332px;
  }
  .tile .frame img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
  .tile .chip {
    position: absolute; top: -14px; left: 16px; z-index: 3;
    background: var(--forest); color: #fff;
    font-size: 12px; font-weight: 800; letter-spacing: 1.5px;
    border-radius: 999px; padding: 8px 16px;
    box-shadow: 0 8px 18px rgba(12, 53, 38, 0.3);
  }
</style>
</head>
<body>

<svg class="bg-leaf" style="bottom:-120px; right:-80px; transform:rotate(32deg)" width="420" height="420" viewBox="0 0 100 100"><path d="M50 3 C80 28 88 60 50 97 C12 60 20 28 50 3 Z" fill="#1d5a3f"/></svg>

<div class="top">
  <h1>One program, one message, four channels</h1>
  <span>The Mintleaf Rewards launch</span>
</div>

<div class="grid">
  <div class="tile">
    <div class="chip">EMAIL</div>
    <div class="frame"><img src="../images/promote/email-anatomy.png" style="object-position: 0 -20px;"></div>
  </div>
  <div class="tile">
    <div class="chip">SOCIAL</div>
    <div class="frame"><img src="../images/promote/social-announcement.png" style="object-position: 0 18%;"></div>
  </div>
  <div class="tile">
    <div class="chip">IN-STORE</div>
    <div class="frame"><img src="../images/promote/poster.png" style="object-position: 0 26%;"></div>
  </div>
  <div class="tile">
    <div class="chip">WEBSITE</div>
    <div class="frame"><img src="../images/promote/website-banner.png"></div>
  </div>
</div>

</body>
</html>
