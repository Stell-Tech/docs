<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="assets/mintleaf.css">
<style>
  body { width: 660px; height: 880px; position: relative; overflow: hidden;
    background: linear-gradient(170deg, #ece2d0 0%, #d8c8ab 100%); }
  /* counter surface */
  body::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 150px;
    background: linear-gradient(180deg, #b6986f 0%, #9c7e57 100%); }

  /* ---------- POS terminal ---------- */
  .pos { position: absolute; left: 50%; bottom: 96px; transform: translateX(-50%); width: 470px; z-index: 1; }

  /* base / foot on the counter */
  .pos .base { position: absolute; left: 50%; bottom: -34px; transform: translateX(-50%);
    width: 250px; height: 30px; border-radius: 8px;
    background: linear-gradient(180deg, #3c3c41, #232327); box-shadow: 0 16px 28px rgba(60,45,20,.4); }
  .pos .neck { position: absolute; left: 50%; bottom: -18px; transform: translateX(-50%);
    width: 60px; height: 90px; background: linear-gradient(90deg, #2b2b2f, #3c3c41, #2b2b2f); }

  /* tablet screen on the stand */
  .pos .tablet {
    position: relative; width: 470px; border-radius: 22px; padding: 16px;
    background: linear-gradient(160deg, #303035, #1b1b1e);
    box-shadow: 0 30px 50px rgba(50,40,20,.45);
  }
  .pos .screen { border-radius: 12px; overflow: hidden; background: #fff; }
  .pos .screen .bar {
    background: var(--forest); color: #fff; padding: 12px 18px;
    display: flex; align-items: center; justify-content: space-between; font-size: 13px;
  }
  .pos .screen .bar .wm { display: flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: 2px; font-size: 13px; }
  .pos .screen .bar .ord { color: var(--mint); font-weight: 700; letter-spacing: .5px; }
  .pos .screen .lines { padding: 14px 18px 6px; }
  .pos .screen .li { display: flex; justify-content: space-between; font-size: 15px; color: var(--ink); padding: 7px 0; }
  .pos .screen .li span:first-child { color: var(--ink-soft); }
  .pos .screen .li b { font-weight: 600; }
  .pos .screen .total { display: flex; justify-content: space-between; align-items: baseline;
    border-top: 1.5px solid var(--line); margin: 6px 18px 0; padding: 12px 0; }
  .pos .screen .total span { font-size: 14px; color: var(--ink-soft); font-weight: 700; letter-spacing: .5px; }
  .pos .screen .total b { font-size: 26px; color: var(--forest-dark); }
  .pos .screen .prompt {
    background: #eef4ee; margin: 0 0 0; padding: 13px 18px; display: flex; align-items: center; gap: 10px;
    font-size: 13.5px; color: var(--forest-dark); font-weight: 600;
  }
  .pos .screen .prompt svg { flex: none; }

  /* ---------- arched topper in a bracket on top of the POS ---------- */
  .bracket { position: absolute; left: 50%; top: -16px; transform: translateX(-50%);
    width: 300px; height: 26px; border-radius: 6px 6px 0 0; background: #18181b; z-index: 2; }
  .bracket::before, .bracket::after { content: ""; position: absolute; top: 6px; width: 10px; height: 18px; background: #2b2b2f; border-radius: 3px; }
  .bracket::before { left: 28px; } .bracket::after { right: 28px; }

  .card {
    position: absolute; left: 50%; top: -290px; transform: translateX(-50%); z-index: 3;
    width: 380px;
    background: var(--cream);
    border-radius: 190px 190px 14px 14px;
    padding: 22px 24px 24px; text-align: center;
    box-shadow: 0 22px 40px rgba(90,70,40,.35);
  }
  .card .arch {
    margin: -22px -24px 0; padding: 26px 20px 16px;
    border-radius: 190px 190px 0 0;
    background: linear-gradient(160deg, var(--forest-mid), var(--forest));
  }
  .card .arch .wordmark { justify-content: center; }
  .card .arch .wordmark .name b { font-size: 15px; letter-spacing: 3px; }
  .card .arch .sub { color: var(--mint); font-size: 11px; font-weight: 700; letter-spacing: 3px; margin-top: 7px; }

  .cols { display: flex; align-items: stretch; justify-content: space-between; gap: 12px; margin-top: 18px; }
  .col { flex: 1; }
  .col .ico { width: 42px; height: 42px; margin: 0 auto; display: flex; align-items: center; justify-content: center; background: #eef4ee; border-radius: 50%; }
  .col label { display: block; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; color: var(--forest-dark); margin-top: 9px; }
  .col span { display: block; font-size: 11px; color: var(--ink-soft); margin-top: 4px; line-height: 1.35; }
  .mid { display: flex; flex-direction: column; align-items: center; }
  .mid .qr-card { padding: 8px; border: 1.5px solid var(--line); }
  .mid .qr-card img { width: 96px; height: 96px; }
  .mid .join { margin-top: 9px; background: var(--forest); color: #fff; font-size: 11px; font-weight: 800; letter-spacing: 1px; border-radius: 999px; padding: 6px 16px; }
</style>
</head>
<body>

<div class="pos">
  <div class="base"></div>
  <div class="neck"></div>

  <div class="tablet">
    <div class="bracket"></div>

    <div class="card">
      <div class="arch">
        <div class="wordmark">
          <svg class="leaf" width="24" height="24" viewBox="0 0 100 100"><path d="M50 3 C80 28 88 60 50 97 C12 60 20 28 50 3 Z" fill="#fff"/><path d="M50 22 L50 92 M50 46 L34 33 M50 64 L66 49" stroke="#14432f" stroke-width="6" fill="none"/></svg>
          <div class="name"><b>MINTLEAF</b></div>
        </div>
        <div class="sub">REWARDS</div>
      </div>
      <div class="cols">
        <div class="col">
          <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#14432f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1 0-4h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg></div>
          <label>EARN</label>
          <span>A point on<br>every cup</span>
        </div>
        <div class="col mid">
          <div class="qr-card"><img src="assets/qr.png" alt=""></div>
          <div class="join">JOIN TODAY</div>
        </div>
        <div class="col">
          <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#14432f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/><path d="M12 8S10 3 7 4s1 4 5 4M12 8s2-5 5-4-1 4-5 4"/></svg></div>
          <label>ENJOY</label>
          <span>Your 10th<br>coffee free</span>
        </div>
      </div>
    </div>

    <div class="screen">
      <div class="bar"><div class="wm">MINTLEAF</div><div class="ord">ORDER #248</div></div>
      <div class="lines">
        <div class="li"><span>Flat White</span><b>$4.50</b></div>
        <div class="li"><span>Almond Croissant</span><b>$3.80</b></div>
      </div>
      <div class="total"><span>TOTAL</span><b>$8.30</b></div>
      <div class="prompt">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#14432f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2.5"/><path d="M2 10h20"/></svg>
        Tap or insert card to pay
      </div>
    </div>
  </div>
</div>

</body>
</html>
