<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="assets/mintleaf.css">
<style>
  body { width: 1280px; height: 720px; }

  .slide {
    width: 1280px; height: 720px; position: relative; overflow: hidden;
    background: linear-gradient(140deg, var(--forest-mid) 0%, var(--forest) 45%, var(--forest-dark) 100%);
  }
  .slide .bg-leaf { position: absolute; opacity: 0.11; }

  .copy { position: absolute; left: 84px; top: 70px; width: 560px; }
  .copy .wordmark .name b { font-size: 16px; }
  .copy .wordmark .name span { font-size: 8px; }
  .copy h1 { color: #fff; font-size: 64px; letter-spacing: -1.2px; line-height: 1.05; margin-top: 44px; }
  .copy h1 em { font-style: normal; color: var(--mint); }
  .copy .sub { color: rgba(255,255,255,.85); font-size: 21px; line-height: 1.5; margin-top: 18px; max-width: 470px; }

  .scan { position: absolute; left: 84px; bottom: 64px; display: flex; align-items: center; gap: 26px; }
  .scan .qr-card { padding: 15px; border-radius: 16px; box-shadow: 0 16px 40px rgba(5,25,17,.4); }
  .scan .qr-card img { width: 158px; height: 158px; display: block; }
  .scan .t b { display: block; color: #fff; font-size: 22px; }
  .scan .t span { display: block; color: rgba(255,255,255,.78); font-size: 14.5px; line-height: 1.5; margin-top: 8px; max-width: 270px; }

  /* phone with the real wallet render, image-led right side */
  .phone {
    position: absolute; right: 150px; top: 34px; transform: rotate(4deg);
    width: 300px; background: #0c0f0e; padding: 9px; border-radius: 46px;
    box-shadow: 0 44px 70px rgba(5,25,17,.55);
  }
  .phone .island { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 86px; height: 24px; border-radius: 13px; background: #0c0f0e; z-index: 5; }
  .phone img { display: block; width: 100%; border-radius: 38px; }
</style>
</head>
<body>

<div class="slide">
  <svg class="bg-leaf" style="bottom:-90px; left:520px; transform:rotate(28deg)" width="300" height="300" viewBox="0 0 100 100"><path d="M50 3 C80 28 88 60 50 97 C12 60 20 28 50 3 Z" fill="#8fe6b4"/></svg>
  <svg class="bg-leaf" style="top:-60px; left:-50px; transform:rotate(-22deg)" width="240" height="240" viewBox="0 0 100 100"><path d="M50 3 C80 28 88 60 50 97 C12 60 20 28 50 3 Z" fill="#8fe6b4"/></svg>

  <div class="copy">
    <div class="wordmark">
      <svg class="leaf" width="34" height="34" viewBox="0 0 100 100"><path d="M50 3 C80 28 88 60 50 97 C12 60 20 28 50 3 Z" fill="#fff"/><path d="M50 22 L50 92 M50 46 L34 33 M50 64 L66 49" stroke="#14432f" stroke-width="6" fill="none"/></svg>
      <div class="name"><b>MINTLEAF</b><span>COFFEE</span></div>
    </div>
    <h1>Your tenth coffee<br>is <em>free</em></h1>
    <div class="sub">Mintleaf Rewards lives in your phone's wallet — no app, no plastic card.</div>
  </div>

  <div class="scan">
    <div class="qr-card"><img src="assets/qr.png" alt=""></div>
    <div class="t">
      <b>Scan to join</b>
      <span>Open the Camera app and point it at the code — this coffee already counts.</span>
    </div>
  </div>

  <div class="phone">
    <div class="island"></div>
    <img src="../images/wallet/iphone-front.png" alt="">
  </div>
</div>

</body>
</html>
