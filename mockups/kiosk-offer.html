<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="assets/mintleaf.css">
<style>
  body { width: 720px; height: 1180px; background: #1c1c1f; }

  /* kiosk bezel */
  .kiosk {
    position: absolute; inset: 0; padding: 22px;
    background: linear-gradient(160deg, #2a2a2e, #161618);
  }
  .screen {
    width: 100%; height: 100%; border-radius: 26px; overflow: hidden;
    background: var(--cream); position: relative;
    display: flex; flex-direction: column;
  }

  /* header */
  .head {
    background: linear-gradient(155deg, var(--forest-mid) 0%, var(--forest) 55%, var(--forest-dark) 100%);
    padding: 30px 40px 34px; text-align: center; position: relative; overflow: hidden;
  }
  .head .bg-leaf { position: absolute; opacity: .12; }
  .head .row { display: flex; align-items: center; justify-content: center; gap: 12px; position: relative; }
  .head .row h2 { color: #fff; font-size: 30px; font-weight: 800; letter-spacing: -.3px; }
  .head .pill {
    position: relative; display: inline-flex; align-items: center; gap: 12px; margin-top: 22px;
    background: #fff; color: var(--forest); border-radius: 999px;
    padding: 16px 34px; font-size: 21px; font-weight: 800; letter-spacing: .3px;
    box-shadow: 0 10px 26px rgba(5,25,17,.4);
  }
  .head .pill svg { display: block; }

  /* body */
  .body { flex: 1; padding: 34px 44px 10px; display: flex; flex-direction: column; }
  .tag {
    align-self: flex-start; background: var(--forest); color: #fff;
    font-size: 13px; font-weight: 800; letter-spacing: 1.5px; border-radius: 999px; padding: 8px 18px;
  }
  .body h1 { font-size: 46px; line-height: 1.08; letter-spacing: -1px; color: var(--forest-dark); margin-top: 18px; }
  .body h1 em { font-style: normal; color: var(--forest-mid); }

  .product { flex: 1; display: flex; align-items: center; justify-content: center; margin: 6px 0; }
  .cup { filter: drop-shadow(0 26px 36px rgba(60,45,20,.28)); }

  /* join bar */
  .join {
    background: var(--cream); border-top: 1.5px solid var(--line);
    padding: 26px 44px; display: flex; align-items: center; gap: 26px;
  }
  .join .qr-card { padding: 12px; border: 1.5px solid var(--line); }
  .join .qr-card img { width: 132px; height: 132px; }
  .join .t b { display: block; font-size: 24px; color: var(--forest-dark); line-height: 1.25; }
  .join .t b i { font-style: normal; color: var(--forest-mid); }
  .join .t span { display: block; font-size: 15px; color: var(--ink-soft); margin-top: 8px; line-height: 1.45; }

  .statusbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 28px; font-size: 13px; color: var(--ink-soft); border-top: 1px solid var(--line);
  }
</style>
</head>
<body>
<div class="kiosk">
  <div class="screen">

    <div class="head">
      <svg class="bg-leaf" style="top:-30px; right:-20px; transform:rotate(24deg)" width="180" height="180" viewBox="0 0 100 100"><path d="M50 3 C80 28 88 60 50 97 C12 60 20 28 50 3 Z" fill="#8fe6b4"/></svg>
      <svg class="bg-leaf" style="bottom:-40px; left:-10px; transform:rotate(-30deg)" width="150" height="150" viewBox="0 0 100 100"><path d="M50 3 C80 28 88 60 50 97 C12 60 20 28 50 3 Z" fill="#8fe6b4"/></svg>
      <div class="row">
        <svg width="34" height="34" viewBox="0 0 100 100"><path d="M50 3 C80 28 88 60 50 97 C12 60 20 28 50 3 Z" fill="#fff"/><path d="M50 22 L50 92 M50 46 L34 33 M50 64 L66 49" stroke="#14432f" stroke-width="6" fill="none"/></svg>
        <h2>Members earn free coffee</h2>
      </div>
      <div class="pill">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#14432f" stroke-width="2.2" stroke-linecap="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="19" r="1.3" fill="#14432f" stroke="none"/></svg>
        TAP HERE TO CHECK IN
      </div>
    </div>

    <div class="body">
      <div class="tag">LIMITED TIME</div>
      <h1>Maple Oat<br><em>Latte</em></h1>
      <div class="product">
        <svg class="cup" width="300" height="360" viewBox="0 0 300 360">
          <defs>
            <linearGradient id="ceramic" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#ffffff"/>
              <stop offset="0.16" stop-color="#f8f4ee"/>
              <stop offset="0.5" stop-color="#eee7db"/>
              <stop offset="0.8" stop-color="#dcd2c2"/>
              <stop offset="1" stop-color="#c6bba6"/>
            </linearGradient>
            <linearGradient id="ceramicHandle" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#e9e1d2"/>
              <stop offset="1" stop-color="#c7bba4"/>
            </linearGradient>
            <radialGradient id="crema" cx="0.4" cy="0.34" r="0.8">
              <stop offset="0" stop-color="#d9b582"/>
              <stop offset="0.42" stop-color="#bd8d55"/>
              <stop offset="0.78" stop-color="#8a5f33"/>
              <stop offset="1" stop-color="#623f21"/>
            </radialGradient>
            <radialGradient id="saucerG" cx="0.5" cy="0.4" r="0.7">
              <stop offset="0" stop-color="#f1e8d6"/>
              <stop offset="1" stop-color="#cdc0a8"/>
            </radialGradient>
            <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5"/></filter>
            <filter id="steamblur" x="-60%" y="-30%" width="220%" height="160%"><feGaussianBlur stdDeviation="3.2"/></filter>
          </defs>

          <!-- drop shadow on table -->
          <ellipse cx="150" cy="322" rx="120" ry="20" fill="#7a6a48" opacity="0.28" filter="url(#soft)"/>

          <!-- steam -->
          <g filter="url(#steamblur)" opacity="0.55" stroke="#cdc2af" stroke-width="6" stroke-linecap="round" fill="none">
            <path d="M126 96 C116 78 134 68 124 50 C117 37 130 27 122 12"/>
            <path d="M158 98 C168 80 152 70 162 52 C169 39 157 29 165 14"/>
          </g>

          <!-- saucer -->
          <ellipse cx="150" cy="300" rx="124" ry="24" fill="url(#saucerG)"/>
          <ellipse cx="150" cy="296" rx="124" ry="22" fill="#f3ead8"/>
          <ellipse cx="150" cy="296" rx="92" ry="15" fill="#000" opacity="0.06"/>

          <!-- handle (behind body) -->
          <path d="M232 168 a44 40 0 0 1 0 78" fill="none" stroke="url(#ceramicHandle)" stroke-width="20" stroke-linecap="round"/>
          <path d="M232 170 a40 36 0 0 1 0 72" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

          <!-- cup body -->
          <path d="M58 132 C 55 214, 70 280, 86 290 Q150 314, 214 290 C 230 280, 245 214, 242 132 Z" fill="url(#ceramic)"/>
          <!-- left sheen -->
          <path d="M80 150 C 74 210, 82 262, 92 280" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" opacity="0.55"/>
          <!-- right inner shadow -->
          <path d="M236 142 C 238 210, 224 270, 210 286" fill="none" stroke="#b6a98f" stroke-width="14" stroke-linecap="round" opacity="0.4"/>

          <!-- rim + coffee surface -->
          <ellipse cx="150" cy="132" rx="94" ry="24" fill="#cabfa9"/>
          <ellipse cx="150" cy="130" rx="90" ry="22" fill="#efe7d8"/>
          <ellipse cx="150" cy="131" rx="82" ry="18" fill="url(#crema)"/>
          <!-- foam ring -->
          <ellipse cx="150" cy="131" rx="82" ry="18" fill="none" stroke="#e6d4b4" stroke-width="3.5" opacity="0.65"/>

          <!-- rosetta latte art (flattened onto the surface) -->
          <g transform="translate(150 131) scale(1 0.42)" stroke="#efe4ce" stroke-width="3.4" stroke-linecap="round" fill="none" opacity="0.95">
            <path d="M0 -34 L0 42"/>
            <circle cx="0" cy="-32" r="4" fill="#efe4ce" stroke="none"/>
            <path d="M0 -20 C -12 -18 -18 -10 -20 -2"/>
            <path d="M0 -8 C -13 -6 -20 3 -23 12"/>
            <path d="M0 5 C -13 7 -21 16 -25 26"/>
            <path d="M0 18 C -11 20 -18 28 -21 36"/>
            <path d="M0 -20 C 12 -18 18 -10 20 -2"/>
            <path d="M0 -8 C 13 -6 20 3 23 12"/>
            <path d="M0 5 C 13 7 21 16 25 26"/>
            <path d="M0 18 C 11 20 18 28 21 36"/>
          </g>

          <!-- front rim highlight -->
          <path d="M70 138 C 95 150, 205 150, 230 138" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </div>
    </div>

    <div class="join">
      <div class="qr-card"><img src="assets/qr.png" alt=""></div>
      <div class="t">
        <b>Join <i>Mintleaf Rewards</i> after you order</b>
        <span>Scan with your phone and pick your free welcome reward — this cup already counts.</span>
      </div>
    </div>

    <div class="statusbar"><span>6:39 PM</span><span>Privacy · Terms · English</span></div>
  </div>
</div>
</body>
</html>
